# SETFOP Daemon Configuration
# ---------------------------

# Path to the audit log (plain text)
audit_log_path = /var/log/setfop/audit.log

# Path to the internal daemon logs
daemon_log_path = /var/log/setfop/daemon.log

# Path to the baseline template (YAML)
template_path = /var/lib/setfop/templates/baseline.yaml

# Path to the list of monitored paths
paths_config = /etc/setfop/paths.conf

# Log level: INFO, WARN, ERROR, DEBUG
log_level = INFO

# Scan interval for integrity checks (in hours). 
# Set to 0 to disable periodic re-scanning (rely only on real-time events).
scan_interval_hours = 24

# Enable SELinux context monitoring? (true/false)
enable_selinux = true
