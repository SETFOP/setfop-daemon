# SETFOP Path Definitions
# Format: <path>
# Rules:
#   /var          -> Monitors only the /var directory itself (shallow)
#   /usr/*        -> Monitors /usr and ALL subdirectories/files recursively
#   /etc/ssh      -> Monitors specifically /etc/ssh and its contents (specific)

# Example Entries:
/var
/usr/*
/etc/ssh
/bin/*
/opt/scripts
